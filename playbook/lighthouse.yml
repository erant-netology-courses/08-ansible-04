---
- name: Install lighthouse
  hosts: lighthouse
  handlers:
    - name: Restart nginx
      become: true
      ansible.builtin.service:
        name: nginx
        state: restarted
  tasks:
    - name: Install nginx and git
      become: true
      ansible.builtin.apt:
        pkg:
          - nginx
          - git
        update_cache: true
      tags:
        - install

    - name: Download Lighthouse from Github
      become: true
      ansible.builtin.git:
        repo: https://github.com/VKCOM/lighthouse.git
        dest: /var/www/html/lighthouse
        version: master
      tags:
        - nginx

    - name: Deploy Nginx config
      become: true
      ansible.builtin.template:
        src: nginx.j2
        dest: /etc/nginx/sites-available/lighthouse
        mode: '0644'
      notify: Restart nginx
      tags:
        - nginx

    - name: Enable lighthouse site
      become: true
      ansible.builtin.file:
        src: /etc/nginx/sites-available/lighthouse
        dest: /etc/nginx/sites-enabled/lighthouse
        state: link
      notify: Restart nginx
      tags:
        - nginx

    - name: Remove default nginx site
      become: true
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart nginx
      tags:
        - nginx
